# Сборка на раннере GitHub → на VPS только git sync, распаковка архива и restart (без npm ci/build на сервере).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/team-tracker' }}
  DEPLOY_SYSTEMD_UNIT: ${{ vars.DEPLOY_SYSTEMD_UNIT || 'team-tracker' }}
  BUILD_ROOT_DOMAIN: ${{ vars.DEPLOY_BUILD_ROOT_DOMAIN || '1' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Проверка секретов
        shell: bash
        run: |
          if [[ -z "${{ secrets.DEPLOY_HOST }}" || -z "${{ secrets.DEPLOY_SSH_KEY }}" ]]; then
            echo "::error::Задайте DEPLOY_HOST и DEPLOY_SSH_KEY. См. deploy/GITHUB-ACTIONS.md"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Сборка (на раннере GitHub, не на VPS)
        run: |
          npm ci
          if [[ "$BUILD_ROOT_DOMAIN" == "1" ]]; then
            export TEAM_TRACKER_ROOT_DOMAIN=1
          fi
          npm run build

      - name: Архив standalone
        run: bash scripts/ci-package-standalone.sh

      - name: SSH-ключ и known_hosts
        run: |
          install -d -m 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' | install -m 600 /dev/stdin ~/.ssh/deploy_ci_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

      - name: Загрузка архива на сервер
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
        run: |
          scp -i ~/.ssh/deploy_ci_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            deploy-standalone.tgz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/deploy-standalone.tgz"

      - name: Распаковка и перезапуск (на VPS — только лёгкие команды)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 10m
          envs: DEPLOY_PATH,DEPLOY_SYSTEMD_UNIT
          script: |
            set -euo pipefail
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "::error::Нет каталога $DEPLOY_PATH — задайте переменную DEPLOY_PATH или создайте symlink (см. deploy/GITHUB-ACTIONS.md)"
              exit 1
            fi
            REAL="$(readlink -f "$DEPLOY_PATH")"
            cd "$REAL"
            git config --global --add safe.directory "$REAL" 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            test -f /tmp/deploy-standalone.tgz
            mkdir -p .next
            rm -rf .next/standalone
            mkdir -p .next/standalone
            tar -xzf /tmp/deploy-standalone.tgz -C .next/standalone
            rm -f /tmp/deploy-standalone.tgz
            UNIT="/etc/systemd/system/${DEPLOY_SYSTEMD_UNIT}.service"
            NEED_RELOAD=0
            if [[ -f "$UNIT" ]] && grep -q 'npm run start' "$UNIT"; then
              cp -a "$UNIT" "${UNIT}.bak.before-standalone-$(date +%Y%m%d%H%M%S)"
              sed -i \
                -e "s|^WorkingDirectory=.*|WorkingDirectory=${REAL}/.next/standalone|" \
                -e "s|^ExecStart=.*|ExecStart=/usr/bin/node server.js|" \
                "$UNIT"
              NEED_RELOAD=1
            fi
            # Nginx обычно proxy_pass на 127.0.0.1; без явного HOSTNAME listen может уйти на 127.0.1.1 / имя ВМ → 502.
            if [[ -f "$UNIT" ]] && ! grep -qE '^Environment=HOSTNAME=' "$UNIT"; then
              sed -i '/^\[Service\]/a Environment=HOSTNAME=127.0.0.1' "$UNIT"
              NEED_RELOAD=1
            fi
            if [[ "$NEED_RELOAD" -eq 1 ]]; then
              systemctl daemon-reload
            fi
            systemctl restart "$DEPLOY_SYSTEMD_UNIT"
            systemctl is-active "$DEPLOY_SYSTEMD_UNIT"
